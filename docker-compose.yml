services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - khel_mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: khel
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - khel_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  engine:
    build:
      context: ./engine
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./engine/.env
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      redis:
        condition: service_healthy

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/khel
      - ENGINE_URL=http://engine:8000
      - CLIENT_URL=http://localhost:80
      - NODE_ENV=production
    depends_on:
      mongodb:
        condition: service_healthy
      engine:
        condition: service_started

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - gateway

volumes:
  khel_mongo_data:
  khel_redis_data:
